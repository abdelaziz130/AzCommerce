<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzCommerce - الرئيسية</title>
    <link rel="stylesheet" href="styles.css">
    <!-- مكتبة Leaflet لعرض الخريطة (إذا احتجنا لاحقًا) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <header>
        <h1>مرحبًا بك في AzCommerce</h1>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="shop.html">المتاجر</a></li>
                <li><a href="contact.html" id="contact-link">تواصل معنا</a></li>
                <li><a href="login.html">تسجيل الدخول</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>أفضل العروض بين يديك!</h2>
        <p>استمتع بأفضل تجربة تسوق عبر الإنترنت مع AzCommerce</p>
        <button id="exploreBtn">استكشاف الآن</button>
    </section>

    <section class="search-bar">
        <input type="text" id="searchBox" placeholder="ابحث عن منتج أو متجر...">
        <button id="searchBtn">🔍 بحث</button>
    </section>

    <section class="features">
        <div class="feature-card">
            <img src="shop.png" alt="المتاجر">
            <h3>اكتشف المتاجر</h3>
        </div>
        <div class="feature-card">
            <img src="offers.png" alt="عروض">
            <h3>أفضل العروض</h3>
        </div>
        <div class="feature-card">
            <img src="delivery.png" alt="توصيل سريع">
            <h3>توصيل سريع</h3>
        </div>
    </section>

    <!-- قسم عرض الخريطة لتحديد الموقع والمحال القريبة -->
    <section class="map-section">
        <h2>استكشف المحلات القريبة</h2>
        <button onclick="getUserLocation()">📍 تحديد موقعي</button>
        <div id="map"></div>
    </section>

    <footer>
        <p>© 2025 جميع الحقوق محفوظة لـ AzCommerce</p>
        <div class="social-links">
            <a href="#"><img src="facebook.png" alt="Facebook"></a>
            <a href="#"><img src="twitter.png" alt="Twitter"></a>
            <a href="#"><img src="instagram.png" alt="Instagram"></a>
        </div>
    </footer>

    <!-- سكربتات جافاسكريبت -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- تحميل Google Places API (تأكد من استبدال YOUR_GOOGLE_API_KEY بمفتاحك) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_API_KEY&libraries=places"></script>
    <script src="script.js"></script>
</body>
</html>
